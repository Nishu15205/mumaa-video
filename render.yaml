services:
  # ─── Socket.IO Signaling Server ─────────────────────
  - type: web
    name: mumaa-socket
    plan: free
    env: docker
    region: singapore
    rootDir: mini-services/socket-service
    envVars:
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        fromService:
          name: mumaa-web
          type: web
          property: hostport

  # ─── Next.js Web Application ─────────────────────────
  - type: web
    name: mumaa-web
    plan: free
    env: docker
    region: singapore
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        fromService:
          name: mumaa-socket
          type: web
          property: hostport
      - key: SOCKET_API_URL
        fromService:
          name: mumaa-socket
          type: web
          property: hostport
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          name: mumaa-web
          type: web
          property: hostport
      - key: JWT_SECRET
        generateValue: true
      - key: TURN_URL
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
